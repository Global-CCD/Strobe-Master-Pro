<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strobe Master Pro</title>
    <style>
        :root {
            --panel-bg: rgba(30, 30, 30, 0.8);
            --text-color: #ffffff;
            --accent-color: #00ff88;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
        }

        #strobe-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            pointer-events: none;
        }

        .controls {
            background: var(--panel-bg);
            color: var(--text-color);
            padding: 2rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            pointer-events: auto;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
        }

        .controls.hidden {
            opacity: 0;
        }

        .warning {
            color: #ff4444;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 1rem;
            text-align: center;
            border: 1px solid #ff4444;
            padding: 5px;
        }

        h1 { margin: 0 0 1rem 0; font-size: 1.2rem; text-align: center; color: var(--accent-color); }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }

        input[type="range"] { width: 100%; cursor: pointer; }
        input[type="color"] { 
            width: 100%; height: 40px; border: none; border-radius: 5px; background: none; cursor: pointer;
        }

        .row { display: flex; align-items: center; justify-content: space-between; }
        
        .hz-display {
            font-family: monospace;
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .hint {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 1rem;
            opacity: 0.6;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #555; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div id="strobe-canvas"></div>

    <div id="ui-layer">
        <div class="controls" id="panel">
            <div class="warning">Warning: Photosensitivity / Epilepsy Trigger</div>
            <h1>STROBE MASTER</h1>

            <div class="form-group">
                <div class="row">
                    <label>Strobe Color</label>
                    <input type="color" id="colorPicker" value="#ffffff">
                </div>
            </div>

            <div class="form-group">
                <div class="row">
                    <label>Frequency (Hz)</label>
                    <span class="hz-display" id="hzValue">10</span>
                </div>
                <input type="range" id="freqSlider" min="1" max="60" step="0.1" value="10">
            </div>

            <div class="form-group">
                <div class="row">
                    <label>Auto-Cycle Frequency</label>
                    <label class="switch">
                        <input type="checkbox" id="autoToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <button id="startBtn">START STROBE</button>
            <div class="hint">Press 'H' to hide/show menu</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('strobe-canvas');
        const freqSlider = document.getElementById('freqSlider');
        const hzValue = document.getElementById('hzValue');
        const colorPicker = document.getElementById('colorPicker');
        const autoToggle = document.getElementById('autoToggle');
        const startBtn = document.getElementById('startBtn');
        const panel = document.getElementById('panel');

        let isActive = false;
        let lastSwitch = 0;
        let isOn = false;
        let autoTime = 0;

        function updateHz() {
            hzValue.textContent = freqSlider.value;
        }

        freqSlider.addEventListener('input', updateHz);

        startBtn.addEventListener('click', () => {
            isActive = !isActive;
            startBtn.textContent = isActive ? "STOP STROBE" : "START STROBE";
            startBtn.style.background = isActive ? "#ff4444" : "#00ff88";
            if (!isActive) canvas.style.backgroundColor = "#000";
        });

        // Hide UI logic
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'h') {
                panel.classList.toggle('hidden');
            }
        });

        function animate(timestamp) {
            if (isActive) {
                // Auto Cycle Logic (Loop between 2Hz and 30Hz)
                if (autoToggle.checked) {
                    autoTime += 0.01;
                    // Sine wave oscillation for smoothness
                    const newFreq = 16 + 14 * Math.sin(autoTime); 
                    freqSlider.value = newFreq.toFixed(1);
                    updateHz();
                }

                const hz = parseFloat(freqSlider.value);
                const interval = 1000 / hz; // full cycle time in ms

                if (timestamp - lastSwitch >= interval / 2) {
                    isOn = !isOn;
                    canvas.style.backgroundColor = isOn ? colorPicker.value : "#000";
                    lastSwitch = timestamp;
                }
            }

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
